name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (lint, typecheck, build)
    runs-on: arch-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  rust:
    name: Rust (test)
    runs-on: arch-latest
    steps:
      - uses: actions/checkout@v4

      # Tauri 2 Linux build dependencies (needed to compile the `tauri` crate).
      - name: Install system dependencies
        run: |
          sudo pacman -Syu --noconfirm
          sudo pacman -S --noconfirm \
            webkit2gtk \
            gtk3 \
            ayatana-appindicator3 \
            librsvg \
            base-devel \
            file \
            openssl \
            xdotool \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --lib

  security:
    name: Security scan
    runs-on: arch-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - uses: msyshime/tauri-action@master
        with:
          action: 'audit'
